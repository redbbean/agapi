site_name: AtomGPT.org API (AGAPI) Documentation
site_url: https://atomgptlab.github.io/agapi
site_description: Documentation for AtomGPT.org - 50+ web apps for materials science, AI, and quantum computation
site_author: Kamal Choudhary
repo_url: https://github.com/atomgptlab/agapi
repo_name: atomgptlab/agapi
edit_uri: edit/main/docs/

copyright: "&copy; 2025 AtomGPTLab, Johns Hopkins University"

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  font:
    text: DM Sans
    code: JetBrains Mono

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/atomgptlab
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/playlist?list=PLjf6vHVv7AoInTVQmfNSMs_12DBXYCcDd
    - icon: fontawesome/brands/spotify
      link: https://open.spotify.com/show/0BnqIOqf2D2cjlAsrqmTQs
  analytics:
    provider: google
    property: G-DWX5E15SF5

extra_css:
  - stylesheets/extra.css

